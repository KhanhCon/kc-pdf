<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PDFCraft — PDF Tools</title>

<!-- pdf-lib for merge/split/export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<!-- SortableJS for drag-reorder -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0f11;
    --surface: #161719;
    --surface2: #1e2022;
    --surface3: #252729;
    --border: #2e3033;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --danger: #ff5a5a;
    --text: #f0f0ee;
    --text-muted: #7a7d82;
    --text-dim: #4a4d52;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 4px 24px rgba(0,0,0,0.5);
    --panel-width: 280px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ─────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.15rem;
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent); }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .lang-toggle {
    display: flex;
    background: var(--surface3);
    border-radius: 20px;
    padding: 2px;
    gap: 2px;
  }
  .lang-toggle button {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 4px 8px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .lang-toggle button.active {
    background: var(--accent);
    color: #0e0f11;
    font-weight: 500;
  }
  .lang-toggle button .flag { font-size: 1rem; }
  .lang-toggle button .lang-label { font-size: 0.68rem; }

  .btn-add-files {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #0e0f11;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.8rem;
    padding: 6px 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-add-files:hover { opacity: 0.88; }
  .btn-add-files:active { transform: scale(0.97); }

  /* ── ACTION BAR ─────────────────────────────── */
  .action-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .action-bar .sep {
    width: 1px; height: 22px;
    background: var(--border);
    margin: 0 2px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface3);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); border-color: #444; }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: var(--accent);
    color: #0e0f11;
    border-color: var(--accent);
    font-weight: 500;
  }
  .btn.primary:hover { opacity: 0.85; }
  .btn.secondary {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn.secondary:hover { background: rgba(71,200,255,0.08); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn:disabled:hover { background: var(--surface3); border-color: var(--border); transform: none; }

  .btn.icon-btn {
    padding: 5px 9px;
    font-size: 1rem;
    line-height: 1;
  }
  .btn.icon-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

  /* Card flash animation for undo/redo feedback */
  @keyframes cardFlash {
    0%   { box-shadow: 0 0 0 0 rgba(232,255,71,0); border-color: var(--border); }
    30%  { box-shadow: 0 0 0 4px rgba(232,255,71,0.5); border-color: var(--accent); }
    100% { box-shadow: 0 0 0 0 rgba(232,255,71,0); border-color: var(--border); }
  }
  .page-card.flash-undo {
    animation: cardFlash 350ms ease-out forwards;
  }
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-left: auto;
  }
  .sel-count span { color: var(--accent); font-weight: 500; }

  /* ── MAIN WORKSPACE ─────────────────────────── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── ORGANIZER PANEL ─────────────────────────── */
  .organizer {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    position: relative;
  }

  /* Drop Zone */
  .drop-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    height: calc(100% - 32px);
    min-height: 300px;
    border: 2px dashed var(--border);
    border-radius: 14px;
    color: var(--text-muted);
    transition: all 0.2s;
    cursor: pointer;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(232,255,71,0.03);
    color: var(--text);
  }
  .drop-zone .dz-icon {
    font-size: 2.5rem;
    opacity: 0.4;
  }
  .drop-zone h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .drop-zone p {
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  /* Page Grid */
  .page-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(max(160px, calc((100% - 100px) / 6)), 1fr));
    gap: 20px;
    padding-bottom: 20px;
    position: relative;
  }

  .page-card {
    position: relative;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    overflow: visible;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
    user-select: none;
    will-change: transform;
  }
  .page-card:hover {
    border-color: #444;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .page-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(232,255,71,0.12);
  }
  .page-card.previewing {
    border-color: var(--accent2);
    box-shadow: 0 0 0 1px var(--accent2);
  }
  .page-card.sortable-ghost {
    opacity: 0;
    border: 2px dashed var(--accent);
    background: rgba(232,255,71,0.06);
    border-radius: var(--radius);
  }
  .page-card.sortable-chosen {
    cursor: grabbing;
    opacity: 0.45;
    transform: scale(0.96) rotate(1deg);
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    z-index: 99;
  }
  .page-card.sortable-drag {
    opacity: 0.45;
    transform: scale(0.96) rotate(1deg);
    box-shadow: 0 16px 48px rgba(0,0,0,0.7);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 0.707;
    background: #2a2b2e;
    border-radius: 8px 8px 0 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-thumb canvas {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .card-thumb .thumb-loading {
    font-size: 0.7rem;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 7px;
    gap: 4px;
  }
  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    line-height: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .card-split-btn {
    background: rgba(71,200,255,0.07);
    border: 1px solid rgba(71,200,255,0.3);
    color: var(--accent2);
    font-size: 0.6rem;
    font-family: 'DM Mono', monospace;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-split-btn:hover {
    background: rgba(71,200,255,0.28);
    border-color: var(--accent2);
    color: #fff;
    box-shadow: 0 0 6px rgba(71,200,255,0.3);
    transform: scale(1.08);
  }

  /* Delete button */
  .card-delete {
    position: absolute;
    top: -7px;
    right: -7px;
    width: 20px; height: 20px;
    background: var(--danger);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 0.7rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
    z-index: 2;
  }
  .page-card:hover .card-delete { opacity: 1; }
  .card-delete:hover { transform: scale(1.15); }

  /* Checkbox */
  .card-check {
    position: absolute;
    top: 6px;
    left: 6px;
    width: 18px; height: 18px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    transition: all 0.15s;
  }
  .page-card.selected .card-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .card-check::after {
    content: '✓';
    font-size: 0.65rem;
    color: #0e0f11;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .page-card.selected .card-check::after { opacity: 1; }

  /* Selection order badge */
  .card-order {
    position: absolute;
    top: 6px;
    right: 28px;
    background: var(--accent);
    color: #0e0f11;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    font-weight: 500;
    padding: 1px 5px;
    border-radius: 4px;
    display: none;
    z-index: 2;
  }
  .page-card.selected .card-order { display: block; }

  /* ── RESIZER ─────────────────────────────────── */
  .resizer {
    width: 5px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.2s;
    position: relative;
    z-index: 5;
  }
  .resizer:hover, .resizer.dragging { background: var(--accent); }

  /* ── RUBBER BAND SELECTION ───────────────────── */
  .rubber-band {
    position: absolute;
    border: 1.5px solid var(--accent);
    background: rgba(232,255,71,0.08);
    border-radius: 3px;
    pointer-events: none;
    z-index: 10;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--surface3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .preview-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--text-dim);
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
  }

  /* ── LOADING OVERLAY ─────────────────────────── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(14,15,17,0.92);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    backdrop-filter: blur(6px);
  }
  .loading-overlay.hidden { display: none; }
  .loading-overlay .lo-spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--surface3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-overlay .lo-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
  }
  .loading-overlay .lo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    min-width: 220px;
    text-align: center;
  }
  .loading-overlay .lo-bar-wrap {
    width: 280px;
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
  }
  .loading-overlay .lo-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.2s ease;
    width: 0%;
  }

  /* ── PREVIEW PANEL ───────────────────────────── */
  .preview-panel {
    width: 50%;
    min-width: 200px;
    max-width: 70vw;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .preview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .preview-header h3 {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .preview-page-info {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  .preview-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    padding: 14px;
    gap: 10px;
  }

  .preview-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    color: var(--text-dim);
    text-align: center;
  }
  .preview-empty .pe-icon { font-size: 2rem; opacity: 0.3; }
  .preview-empty p { font-size: 0.75rem; line-height: 1.5; }

  .preview-canvas-wrap {
    flex: 1;
    overflow: auto;
    background: #fff;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    min-height: 0;
  }
  .preview-canvas-wrap canvas {
    display: block;
  }

  .preview-meta {
    width: 100%;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    line-height: 1.8;
  }

  /* ── MODAL OVERLAY ───────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.15s ease;
  }
  .modal-overlay.hidden { display: none; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 900px;
    height: 96vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    animation: slideUp 0.2s ease;
    overflow: hidden;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 4px;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }

  /* ── MODAL ZOOM TOOLBAR ──────────────────────── */
  .modal-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    flex-shrink: 0;
    gap: 8px;
  }
  .modal-toolbar .zoom-controls {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .modal-toolbar .zoom-btn {
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    width: 28px;
    height: 28px;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .modal-toolbar .zoom-btn:hover { background: var(--surface); }
  .modal-toolbar .zoom-pct {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    min-width: 44px;
    text-align: center;
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 4px;
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .modal-toolbar .zoom-pct:hover { border-color: var(--border); }
  .modal-toolbar .page-indicator {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .modal-toolbar .page-indicator span { color: var(--text); }

  /* ── MODAL VIEWER ZOOM WRAP ──────────────────── */
  .modal-viewer-zoom {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px;
    gap: 20px;
    transform-origin: top center;
    transition: transform 0.15s ease;
  }
  .modal-viewer {
    flex: 1;
    overflow-y: auto;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px;
    gap: 20px;
  }

  .modal-page-block {
    width: 100%;
    max-width: 760px;
    position: relative;
    border-radius: var(--radius);
    overflow: visible;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    transition: outline 0.15s;
    outline: 3px solid transparent;
    background: #fff;
  }
  .modal-page-block.active {
    outline-color: var(--accent2);
  }
  .modal-page-block canvas {
    display: block;
    width: 100% !important;
    height: auto !important;
    border-radius: var(--radius);
  }
  .modal-page-block .mpb-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    padding: 24px 12px 8px;
    border-radius: 0 0 var(--radius) var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.7);
    pointer-events: none;
  }
  .modal-page-block .mpb-loading {
    background: var(--surface2);
    aspect-ratio: 0.707;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── FILMSTRIP ── */
  .modal-filmstrip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .modal-filmstrip::-webkit-scrollbar { height: 4px; }
  .modal-filmstrip::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

  .film-thumb {
    flex-shrink: 0;
    width: 70px;
    position: relative;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 6px;
    overflow: visible;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .film-thumb:hover { border-color: #555; transform: translateY(-2px); }
  .film-thumb.active {
    border-color: var(--accent2);
    box-shadow: 0 0 0 1px var(--accent2);
  }
  .film-thumb.sortable-ghost { opacity: 0.3; }
  .film-thumb .ft-img {
    width: 100%;
    aspect-ratio: 0.707;
    border-radius: 4px 4px 0 0;
    overflow: hidden;
    background: #2a2b2e;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .film-thumb .ft-img canvas { width: 100%; height: 100%; object-fit: contain; }
  .film-thumb .ft-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--text-muted);
    padding: 3px 5px;

<script>
if ('serviceWorker' in navigator) {
  // Inline service worker as a blob to avoid needing a separate sw.js file
  const swCode = `
const CACHE = 'pdfcraft-v1';
const WASM_URL = './mupdf-wasm.wasm';
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.add(WASM_URL)).catch(() => {})
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  if (e.request.url.includes('mupdf-wasm.wasm')) {
    e.respondWith(
      caches.open(CACHE).then(async c => {
        const cached = await c.match(e.request);
        if (cached) return cached;
        const res = await fetch(e.request);
        c.put(e.request, res.clone());
        return res;
      })
    );
  }
});
`;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: './' }).catch(() => {});
}

<script type="module">

    preview: 'Xem Trước',
    previewEmpty: 'Di chuột vào trang\nđể xem trước',
    modalHint: 'Kéo trang để sắp xếp · ✕ để xoá · rồi xuất file',

    page: 'Trang',
    of: 'của',
    filenamePrompt: 'Lưu với tên:',
    loading: 'Đang tải PDF…',
    loadingPage: 'Đang render trang',
    merging: 'Đang xuất file…',
    mergingModal: 'Đang nối files…',

};

let lang = localStorage.getItem('pdfcraft-lang') || 'en';
function t(key) { return STRINGS[lang][key] || key; }

function setLang(l) {
  lang = l;
  localStorage.setItem('pdfcraft-lang', l);
  document.getElementById('btnEN').classList.toggle('active', l === 'en');
  document.getElementById('btnVI').classList.toggle('active', l === 'vi');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (el.tagName === 'INPUT') el.placeholder = t(key);
    else el.textContent = t(key);
  });
  updateSelCount();
}

// Expose setLang globally so onclick= attributes work
window.setLang = setLang;

// ── State ─────────────────────────────────────────────────────────────────────
// pages[i] = { id, pdfBytes, pageIndex, fileName, mupdfDoc, selected, orderNum }
let pages = [];
let selectedOrder = [];
let previewingId = null;
let modalPages = [];

// ── Caches ────────────────────────────────────────────────────────────────────
const thumbCache = new Map();   // id → canvas (low-res, rendered by MuPDF)
const fullCache  = new Map();   // id → canvas (full-res, rendered by MuPDF)

// ── History (undo/redo) ───────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let undoStack = []; // each entry: { pages: snapshot, selectedOrder: snapshot }
let redoStack = [];

function snapshotState() {
  return {
    pages: pages.map(p => ({ ...p })),
    selectedOrder: [...selectedOrder],
  };
}

function pushHistory() {
  undoStack.push(snapshotState());
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  redoStack = []; // clear redo on new action
  updateUndoButtons();
}

function updateUndoButtons() {
  const u = document.getElementById('btnUndo');
  const r = document.getElementById('btnRedo');
  if (u) u.disabled = undoStack.length === 0;
  if (r) r.disabled = redoStack.length === 0;
}

function flashChangedCards(prevIds, nextIds) {
  // Find cards that changed (added, removed, reordered, selection changed)
  const prevMap = new Map(prevIds.map((id, i) => [id, i]));
  const nextMap = new Map(nextIds.map((id, i) => [id, i]));
  const changed = new Set();
  nextIds.forEach((id, i) => {
    if (!prevMap.has(id) || prevMap.get(id) !== i) changed.add(id);
  });
  prevIds.forEach(id => { if (!nextMap.has(id)) changed.add(id); });
  // Also flash cards whose selection changed
  changed.forEach(id => {
    const card = document.querySelector(`.page-card[data-id="${id}"]`);
    if (!card) return;
    card.classList.remove('flash-undo');
    void card.offsetWidth; // reflow to restart animation
    card.classList.add('flash-undo');
    setTimeout(() => card.classList.remove('flash-undo'), 360);
  });
}

function restoreState(snapshot) {
  const prevIds = pages.map(p => p.id);
  pages = snapshot.pages.map(p => ({ ...p }));
  selectedOrder = [...snapshot.selectedOrder];
  renderGrid();
  flashChangedCards(prevIds, pages.map(p => p.id));
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(snapshotState());
  const prev = undoStack.pop();
  restoreState(prev);
  updateUndoButtons();
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(snapshotState());
  const next = redoStack.pop();
  restoreState(next);
  updateUndoButtons();
}

// Apply saved lang (must be after pages declaration)
setLang(lang);

// ── MuPDF rendering helpers ───────────────────────────────────────────────────
function mupdfRenderPage(mupdfDoc, pageIndex, scale) {
  const page = mupdfDoc.loadPage(pageIndex);
  try {
    const matrix = mupdf.Matrix.scale(scale, scale);
    // alpha=false → RGB (3 bytes/px), showExtras=true includes annotations
    const pixmap = page.toPixmap(matrix, mupdf.ColorSpace.DeviceRGB, false, true);
    try {
      const w = pixmap.getWidth();
      const h = pixmap.getHeight();
      const pixels = pixmap.getPixels(); // Uint8ClampedArray, RGB stride
      const stride = Math.floor(pixels.length / h); // bytes per row
      // Convert RGB stride data to tight RGBA for ImageData
      const rgba = new Uint8ClampedArray(w * h * 4);
      for (let row = 0; row < h; row++) {
        for (let col = 0; col < w; col++) {
          const src = row * stride + col * 3;
          const dst = (row * w + col) * 4;
          rgba[dst]   = pixels[src];
          rgba[dst+1] = pixels[src+1];
          rgba[dst+2] = pixels[src+2];
          rgba[dst+3] = 255;
        }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').putImageData(new ImageData(rgba, w, h), 0, 0);
      return canvas;
    } finally {
      pixmap.destroy();
    }
  } finally {
    page.destroy();
  }
}

// ── File loading ──────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  loadFiles(Array.from(e.target.files));
  e.target.value = '';
});

const dropZone = document.getElementById('dropZone');
const organizer = document.getElementById('organizer');

// Prevent Chrome from navigating to dropped files at document level
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  // If dropped outside the organizer, still load PDFs
  if (!e.target.closest('#organizer')) {
    const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
    if (files.length) loadFiles(files);
  }
});

['dragenter','dragover'].forEach(ev => {
  organizer.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
});
['dragleave','drop'].forEach(ev => {
  organizer.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('drag-over'); });
});
organizer.addEventListener('drop', e => {
  const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
  if (files.length) loadFiles(files);
});

// ── File input / Drop ─────────────────────────────────────────────────────────
function showLoadingOverlay(msg) {
  const ov = document.getElementById('loadingOverlay');
  ov.classList.remove('hidden');
  document.getElementById('loadingStatus').textContent = msg || '…';
  document.getElementById('loadingBar').style.width = '0%';
}
function setLoadingProgress(pct, msg) {
  document.getElementById('loadingBar').style.width = pct + '%';
  if (msg) document.getElementById('loadingStatus').textContent = msg;
}
function hideLoadingOverlay() {
  document.getElementById('loadingOverlay').classList.add('hidden');
}

async function loadFiles(files) {
  const pdfFiles = Array.from(files).filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
  if (!pdfFiles.length) return;

  showLoadingOverlay(t('loading'));

  // Step 1: Parse all PDFs and collect pages using MuPDF
  const newPages = [];
  for (let fi = 0; fi < pdfFiles.length; fi++) {
    const file = pdfFiles[fi];
    setLoadingProgress(
      (fi / pdfFiles.length) * 20,
      `${t('loading')} ${fi + 1}/${pdfFiles.length}: ${file.name}`
    );
    try {
      const bytes = await file.arrayBuffer();
      const pdfBytes = new Uint8Array(bytes);
      // Open with MuPDF (for rendering)
      const mupdfDoc = mupdf.Document.openDocument(pdfBytes.buffer, 'application/pdf');
      const numPages = mupdfDoc.countPages();
      for (let i = 0; i < numPages; i++) {
        const id = crypto.randomUUID();
        newPages.push({
          id,
          pdfBytes,           // raw bytes for pdf-lib export
          pageIndex: i,       // 0-indexed
          fileName: file.name,
          mupdfDoc,           // MuPDF doc for rendering
          numPages,
          selected: false,
          orderNum: 0
        });
      }
    } catch(e) {
      console.error(e);
      showToast('Failed: ' + file.name, 'error');
    }
  }

  pages.push(...newPages);

  // Step 2: Render ALL thumbnails before showing grid
  const total = newPages.length;
  for (let i = 0; i < total; i++) {
    const pg = newPages[i];
    setLoadingProgress(
      20 + ((i / total) * 78),
      `${t('loadingPage')} ${i + 1} / ${total}`
    );
    await renderThumbForPage(pg);
  }

  setLoadingProgress(100, '✓');
  renderGrid();
  await new Promise(r => setTimeout(r, 300));
  hideLoadingOverlay();

  // Background: cache full pages silently, no UI blocking
  cacheFullPagesInBackground(newPages);
}

// Renders full pages into fullCache sequentially in the background.
// Uses setTimeout to yield to the UI between each page so the app stays responsive.
async function cacheFullPagesInBackground(pagesToCache) {
  for (const pg of pagesToCache) {
    if (fullCache.has(pg.id)) continue;
    await new Promise(resolve => setTimeout(resolve, 0)); // yield to UI thread
    try {
      const page = pg.mupdfDoc.loadPage(pg.pageIndex);
      const bounds = page.getBounds();
      page.destroy();
      const naturalW = bounds[2] - bounds[0];
      const scale = 760 / naturalW;
      const canvas = mupdfRenderPage(pg.mupdfDoc, pg.pageIndex, scale);
      fullCache.set(pg.id, canvas);
    } catch(e) {}
  }
}

async function renderThumbForPage(pg) {
  if (thumbCache.has(pg.id)) return;
  try {
    // Scale to ~150px wide for thumbnails
    const page = pg.mupdfDoc.loadPage(pg.pageIndex);
    const bounds = page.getBounds();
    page.destroy();
    const w = bounds[2] - bounds[0];
    const scale = 150 / w;
    const canvas = mupdfRenderPage(pg.mupdfDoc, pg.pageIndex, scale);
    thumbCache.set(pg.id, canvas);
  } catch(e) { console.error('thumb render error', e); }
}

// ── Grid rendering ────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('pageGrid');
  const dz = document.getElementById('dropZone');
  const ab = document.getElementById('actionBar');

  if (pages.length === 0) {
    dz.style.display = '';
    grid.style.display = 'none';
    ab.style.display = 'none';
    return;
  }

  dz.style.display = 'none';
  grid.style.display = '';
  ab.style.display = '';
  grid.innerHTML = '';

  pages.forEach((pg) => {
    const card = document.createElement('div');
    card.className = 'page-card' + (pg.selected ? ' selected' : '') + (pg.id === previewingId ? ' previewing' : '');
    card.dataset.id = pg.id;

    card.innerHTML = `
      <div class="card-check"></div>
      <div class="card-order" data-order="${pg.orderNum}">${pg.orderNum}</div>
      <div class="card-thumb" id="thumb-${pg.id}"></div>
      <div class="card-footer">
        <span class="card-label" title="${pg.fileName} p.${pg.pageIndex+1}">p.${pg.pageIndex+1} · ${shortName(pg.fileName)}</span>
        <button class="card-split-btn" data-i18n="split" onclick="splitPage(event,'${pg.id}')">${t('split')}</button>
      </div>
      <button class="card-delete" title="Delete" onclick="deletePage(event,'${pg.id}')">✕</button>
    `;

    // Paint cached thumb
    if (thumbCache.has(pg.id)) {
      const el = card.querySelector('#thumb-' + pg.id);
      el.appendChild(copyCanvas(thumbCache.get(pg.id)));
    }

    card.addEventListener('click', e => {
      if (e.target.classList.contains('card-split-btn') || e.target.classList.contains('card-delete')) return;
      toggleSelect(pg.id);
    });

    // Hover preview — thumbs always ready so just trigger preview
    let hoverTimer = null;
    card.addEventListener('mouseenter', () => {
      hoverTimer = setTimeout(() => setPreview(pg.id), 80);
    });
    card.addEventListener('mouseleave', () => {
      if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
    });

    grid.appendChild(card);
  });

  // Sortable
  if (window._sortable) window._sortable.destroy();
  window._sortable = Sortable.create(grid, {
    animation: 350,
    easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    dragClass: 'sortable-drag',
    onEnd(evt) {
      pushHistory();
      const moved = pages.splice(evt.oldIndex, 1)[0];
      pages.splice(evt.newIndex, 0, moved);
      updateSelCount();
    }
  });

  updateSelCount();
}

function shortName(name) {
  return name.length > 12 ? name.slice(0, 10) + '…' : name;
}

// ── Selection ─────────────────────────────────────────────────────────────────
function toggleSelect(id) {
  const pg = pages.find(p => p.id === id);
  if (!pg) return;
  pushHistory();
  if (pg.selected) {
    pg.selected = false;
    pg.orderNum = 0;
    selectedOrder = selectedOrder.filter(x => x !== id);
    // renumber
    selectedOrder.forEach((sid, i) => {
      const p = pages.find(p => p.id === sid);
      if (p) p.orderNum = i + 1;
    });
  } else {
    pg.selected = true;
    selectedOrder.push(id);
    pg.orderNum = selectedOrder.length;
  }
  // Update card visually
  const card = document.querySelector(`.page-card[data-id="${id}"]`);
  if (card) {
    card.classList.toggle('selected', pg.selected);
    card.querySelector('.card-order').textContent = pg.orderNum || '';
    // renumber all visible orders
    pages.forEach(p => {
      const c = document.querySelector(`.page-card[data-id="${p.id}"]`);
      if (c) c.querySelector('.card-order').textContent = p.orderNum || '';
    });
  }
  updateSelCount();
  setPreview(id);
}

function selectAll() {
  pushHistory();
  selectedOrder = [];
  pages.forEach(pg => {
    pg.selected = true;
    selectedOrder.push(pg.id);
    pg.orderNum = selectedOrder.length;
  });
  refreshCardStates();
  updateSelCount();
}

function unselectAll() {
  pushHistory();
  pages.forEach(pg => { pg.selected = false; pg.orderNum = 0; });
  selectedOrder = [];
  refreshCardStates();
  updateSelCount();
}

function inverseSelect() {
  pushHistory();
  selectedOrder = [];
  pages.forEach(pg => {
    pg.selected = !pg.selected;
  });
  pages.forEach(pg => {
    if (pg.selected) selectedOrder.push(pg.id);
    else pg.orderNum = 0;
  });
  selectedOrder.forEach((id, i) => {
    const pg = pages.find(p => p.id === id);
    if (pg) pg.orderNum = i + 1;
  });
  refreshCardStates();
  updateSelCount();
}

function refreshCardStates() {
  pages.forEach(pg => {
    const card = document.querySelector(`.page-card[data-id="${pg.id}"]`);
    if (!card) return;
    card.classList.toggle('selected', pg.selected);
    card.querySelector('.card-order').textContent = pg.orderNum || '';
  });
}

function updateSelCount() {
  const selCount = pages.filter(p => p.selected).length;
  document.getElementById('selCountNum').textContent = selCount;
  document.getElementById('totalCount').textContent = pages.length;
  document.getElementById('btnMergeSel').disabled = selCount === 0;
}

// ── Canvas copy helper ────────────────────────────────────────────────────────
function copyCanvas(src) {
  const dst = document.createElement('canvas');
  dst.width = src.width;
  dst.height = src.height;
  dst.getContext('2d').drawImage(src, 0, 0);
  return dst;
}

// ── Preview ───────────────────────────────────────────────────────────────────
let renderingId = null;

async function setPreview(id) {
  const pg = pages.find(p => p.id === id);
  if (!pg) return;
  if (previewingId === id && fullCache.has(id)) return;

  previewingId = id;
  document.querySelectorAll('.page-card').forEach(c => c.classList.remove('previewing'));
  const card = document.querySelector(`.page-card[data-id="${id}"]`);
  if (card) card.classList.add('previewing');
  document.getElementById('previewInfo').textContent = `${t('page')} ${pg.pageIndex + 1} ${t('of')} ${pg.numPages}`;

  const body = document.getElementById('previewBody');

  if (fullCache.has(id)) {
    body.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'preview-canvas-wrap';
    wrap.appendChild(copyCanvas(fullCache.get(id)));
    body.appendChild(wrap);
    appendPreviewMeta(body, pg);
    return;
  }

  body.innerHTML = `<div class="preview-loading"><div class="spinner"></div></div>`;
  if (renderingId === id) return;
  renderingId = id;

  try {
    const panelEl = document.getElementById('previewPanel');
    const panelW = Math.min((panelEl ? panelEl.offsetWidth - 28 : 600), 800);
    const safeW = panelW > 50 ? panelW : 600;

    // Get page natural width to compute scale
    const page = pg.mupdfDoc.loadPage(pg.pageIndex);
    const bounds = page.getBounds();
    page.destroy();
    const naturalW = bounds[2] - bounds[0];
    const scale = safeW / naturalW;

    const canvas = mupdfRenderPage(pg.mupdfDoc, pg.pageIndex, scale);
    fullCache.set(id, canvas);
    renderingId = null;

    if (previewingId !== id) return;
    body.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'preview-canvas-wrap';
    wrap.appendChild(copyCanvas(canvas));
    body.appendChild(wrap);
    appendPreviewMeta(body, pg);
  } catch(e) {
    renderingId = null;
    if (previewingId === id)
      body.innerHTML = `<div style="color:var(--danger);font-size:0.75rem;padding:16px">Error rendering page</div>`;
  }
}

function appendPreviewMeta(body, pg) {
  const meta = document.createElement('div');
  meta.className = 'preview-meta';
  meta.innerHTML = `📄 ${pg.fileName}<br/>🔢 ${t('page')} ${pg.pageIndex + 1} / ${pg.numPages}`;
  body.appendChild(meta);
}

// ── Delete / Split ────────────────────────────────────────────────────────────
function deletePage(e, id) {
  e.stopPropagation();
  pushHistory();
  pages = pages.filter(p => p.id !== id);
  selectedOrder = selectedOrder.filter(x => x !== id);
  if (previewingId === id) {
    previewingId = null;
    document.getElementById('previewBody').innerHTML = `<div class="preview-empty"><div class="pe-icon">👁</div><p>${t('previewEmpty')}</p></div>`;
    document.getElementById('previewInfo').textContent = '';
  }
  renderGrid();
}

async function splitPage(e, id) {
  e.stopPropagation();
  const pg = pages.find(p => p.id === id);
  if (!pg) return;
  const defaultName = `page-${pg.pageIndex + 1}-${pg.fileName}`.replace(/\.pdf$/i, '') + '.pdf';
  try {
    const srcDoc = await PDFLib.PDFDocument.load(pg.pdfBytes);
    const newDoc = await PDFLib.PDFDocument.create();
    const [copied] = await newDoc.copyPages(srcDoc, [pg.pageIndex]);
    newDoc.addPage(copied);
    const outBytes = await newDoc.save();
    const saved = await downloadPDF(outBytes, defaultName);
    if (saved) showToast(t('toastExported'), 'success');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

// ── Merge ─────────────────────────────────────────────────────────────────────
function mergeAll() {
  if (pages.length === 0) { showToast(t('toastNoPages')); return; }
  // order = left-to-right grid order
  openModal(pages.map((p, i) => ({ ...p, _selIdx: i })), t('mergeAllTitle'));
}

function mergeSelected() {
  const sel = selectedOrder.map(id => pages.find(p => p.id === id)).filter(Boolean);
  if (sel.length === 0) { showToast(t('toastNoPages')); return; }
  openModal(sel, t('mergeSelTitle'));
}

// ── Modal ─────────────────────────────────────────────────────────────────────
let filmSortable = null;
let activeModalIdx = 0;

async function openModal(pagesArr, title) {
  modalPages = pagesArr.map(p => ({ ...p }));
  document.getElementById('modalTitle').textContent = title;
  activeModalIdx = 0;

  const uncachedThumbs = modalPages.filter(pg => !thumbCache.has(pg.id));
  const uncachedFull   = modalPages.filter(pg => !fullCache.has(pg.id));
  const hasWork = uncachedThumbs.length > 0 || uncachedFull.length > 0;

  if (hasWork) {
    showLoadingOverlay(t('mergingModal'));
    await new Promise(r => setTimeout(r, 30));

    const total = modalPages.length;

    for (let i = 0; i < uncachedThumbs.length; i++) {
      setLoadingProgress(
        Math.round((i / total) * 50),
        `${t('mergingModal')} ${i + 1} / ${total}`
      );
      await renderThumbForPage(uncachedThumbs[i]);
    }

    for (let i = 0; i < uncachedFull.length; i++) {
      setLoadingProgress(
        50 + Math.round((i / total) * 49),
        `${t('mergingModal')} ${i + 1} / ${total}`
      );
      const pg = uncachedFull[i];
      try {
        const page = pg.mupdfDoc.loadPage(pg.pageIndex);
        const bounds = page.getBounds();
        page.destroy();
        const naturalW = bounds[2] - bounds[0];
        const scale = 760 / naturalW;
        const canvas = mupdfRenderPage(pg.mupdfDoc, pg.pageIndex, scale);
        fullCache.set(pg.id, canvas);
      } catch(e) {}
    }

    hideLoadingOverlay();
  }

  modalZoomLevel = 1.0;
  renderModalFull();
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  modalPages = [];
  if (filmSortable) { filmSortable.destroy(); filmSortable = null; }
}

function renderModalFull() {
  renderModalViewer();
  renderModalFilmstrip();
  document.getElementById('modalPageCount').textContent = modalPages.length;
}

function renderModalViewer() {
  const zoomWrap = document.getElementById('modalViewerZoom');
  zoomWrap.innerHTML = '';

  modalPages.forEach((pg, idx) => {
    const block = document.createElement('div');
    block.className = 'modal-page-block' + (idx === activeModalIdx ? ' active' : '');
    block.dataset.idx = idx;
    block.id = `mpb-${idx}`;

    const loadDiv = document.createElement('div');
    loadDiv.className = 'mpb-loading';
    loadDiv.innerHTML = '<div class="spinner"></div>';
    block.appendChild(loadDiv);

    const label = document.createElement('div');
    label.className = 'mpb-label';
    label.textContent = `${idx + 1} · ${shortName(pg.fileName)} p.${pg.pageIndex + 1}`;
    block.appendChild(label);

    block.addEventListener('mouseenter', () => setActiveModalIdx(idx, false));

    zoomWrap.appendChild(block);
    renderModalPageFull(pg, idx);
  });

  const viewer = document.getElementById('modalViewer');
  viewer.addEventListener('scroll', onModalViewerScroll);

  // Update page indicator total
  document.getElementById('modalTotalPages').textContent = modalPages.length;
  document.getElementById('modalCurPage').textContent = Math.min(1, modalPages.length);
}

function onModalViewerScroll() {
  const viewer = document.getElementById('modalViewer');
  const viewerRect = viewer.getBoundingClientRect();
  const centerY = viewerRect.top + viewerRect.height / 2;
  let closest = 0, closestDist = Infinity;
  modalPages.forEach((_, idx) => {
    const block = document.getElementById(`mpb-${idx}`);
    if (!block) return;
    const r = block.getBoundingClientRect();
    const dist = Math.abs((r.top + r.bottom) / 2 - centerY);
    if (dist < closestDist) { closestDist = dist; closest = idx; }
  });
  if (closest !== activeModalIdx) setActiveModalIdx(closest, false);
}

function setActiveModalIdx(idx, scrollViewer = true) {
  activeModalIdx = idx;
  document.querySelectorAll('.modal-page-block').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.film-thumb').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
  const strip = document.getElementById('modalFilmstrip');
  const thumb = strip.querySelector(`.film-thumb[data-idx="${idx}"]`);
  if (thumb) thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  if (scrollViewer) {
    const block = document.getElementById(`mpb-${idx}`);
    if (block) block.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  // Update page indicator
  document.getElementById('modalCurPage').textContent = idx + 1;
}

async function renderModalPageFull(pg, idx) {
  const block = document.getElementById(`mpb-${idx}`);
  if (!block) return;
  try {
    let canvas;
    // Reuse fullCache if available — no re-render needed
    if (fullCache.has(pg.id)) {
      canvas = copyCanvas(fullCache.get(pg.id));
    } else {
      const viewer = document.getElementById('modalViewer');
      const maxW = Math.min((viewer ? viewer.offsetWidth - 48 : 720), 760);
      const safeW = maxW > 0 ? maxW : 720;
      const page = pg.mupdfDoc.loadPage(pg.pageIndex);
      const bounds = page.getBounds();
      page.destroy();
      const naturalW = bounds[2] - bounds[0];
      const scale = safeW / naturalW;
      canvas = mupdfRenderPage(pg.mupdfDoc, pg.pageIndex, scale);
      fullCache.set(pg.id, canvas);
      canvas = copyCanvas(canvas);
    }
    if (!block.isConnected) return;
    block.querySelector('.mpb-loading')?.remove();
    const label = block.querySelector('.mpb-label');
    if (label) block.insertBefore(canvas, label);
    else block.appendChild(canvas);
  } catch(e) { console.error('modal page render error', e); }
}

function renderModalFilmstrip() {
  const strip = document.getElementById('modalFilmstrip');
  strip.innerHTML = '';

  modalPages.forEach((pg, idx) => {
    const thumb = document.createElement('div');
    thumb.className = 'film-thumb' + (idx === activeModalIdx ? ' active' : '');
    thumb.dataset.idx = idx;

    const ftImg = document.createElement('div');
    ftImg.className = 'ft-img';
    ftImg.id = `fthumb-${idx}`;

    // Paint synchronously from cache — avoids innerHTML overwrite bug
    if (thumbCache.has(pg.id)) {
      ftImg.appendChild(copyCanvas(thumbCache.get(pg.id)));
    } else {
      const spinner = document.createElement('div');
      spinner.className = 'spinner';
      spinner.style.cssText = 'width:16px;height:16px;border-width:2px';
      ftImg.appendChild(spinner);
      renderFilmThumb(pg, idx); // async fallback
    }

    const numDiv = document.createElement('div');
    numDiv.className = 'ft-num';
    numDiv.textContent = idx + 1;

    const delBtn = document.createElement('button');
    delBtn.className = 'ft-del';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', e => modalFilmDelete(e, idx));

    thumb.appendChild(ftImg);
    thumb.appendChild(numDiv);
    thumb.appendChild(delBtn);
    thumb.addEventListener('click', () => setActiveModalIdx(idx, true));
    strip.appendChild(thumb);
  });

  if (filmSortable) filmSortable.destroy();
  filmSortable = Sortable.create(strip, {
    animation: 150,
    ghostClass: 'sortable-ghost',
    onEnd(evt) {
      const moved = modalPages.splice(evt.oldIndex, 1)[0];
      modalPages.splice(evt.newIndex, 0, moved);
      activeModalIdx = evt.newIndex;
      renderModalFull();
    }
  });
}

async function renderFilmThumb(pg, idx) {
  const container = document.getElementById(`fthumb-${idx}`);
  if (!container) return;
  // Use cached thumb if available
  if (thumbCache.has(pg.id)) {
    container.innerHTML = '';
    container.appendChild(copyCanvas(thumbCache.get(pg.id)));
    return;
  }
  try {
    const page = pg.mupdfDoc.loadPage(pg.pageIndex);
    const bounds = page.getBounds();
    page.destroy();
    const w = bounds[2] - bounds[0];
    const scale = 70 / w; // filmstrip thumb ~70px wide
    const canvas = mupdfRenderPage(pg.mupdfDoc, pg.pageIndex, scale);
    if (!container.isConnected) return;
    container.innerHTML = '';
    container.appendChild(canvas);
  } catch(e) {}
}

// ── Modal zoom ────────────────────────────────────────────────────────────────
let modalZoomLevel = 1.0;
const ZOOM_STEPS = [0.25, 0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.5, 3.0];

function applyModalZoom() {
  const zoomWrap = document.getElementById('modalViewerZoom');
  if (!zoomWrap) return;
  zoomWrap.style.transform = `scale(${modalZoomLevel})`;
  // Adjust wrap height so scrollable area reflects scaled size
  zoomWrap.style.transformOrigin = 'top center';
  // Expand the scroll container to accommodate scaled content
  const naturalH = zoomWrap.scrollHeight / modalZoomLevel;
  zoomWrap.style.marginBottom = `${(modalZoomLevel - 1) * naturalH}px`;
  document.getElementById('modalZoomPct').textContent = Math.round(modalZoomLevel * 100) + '%';
}

function modalZoom(dir) {
  const cur = ZOOM_STEPS.indexOf(
    ZOOM_STEPS.reduce((prev, curr) =>
      Math.abs(curr - modalZoomLevel) < Math.abs(prev - modalZoomLevel) ? curr : prev
    )
  );
  const next = Math.max(0, Math.min(ZOOM_STEPS.length - 1, cur + dir));
  modalZoomLevel = ZOOM_STEPS[next];
  applyModalZoom();
}

function modalZoomReset() {
  modalZoomLevel = 1.0;
  applyModalZoom();
}

// Ctrl + scroll wheel to zoom
document.getElementById('modalViewer').addEventListener('wheel', e => {
  if (!e.ctrlKey) return;
  e.preventDefault();
  modalZoom(e.deltaY < 0 ? +1 : -1);
}, { passive: false });

function toggleFilmstrip() {
  const wrap = document.getElementById('modalFilmstripWrap');
  wrap.classList.toggle('collapsed');
}

function modalFilmDelete(e, idx) {
  e.stopPropagation();
  modalPages.splice(idx, 1);
  if (activeModalIdx >= modalPages.length) activeModalIdx = Math.max(0, modalPages.length - 1);
  renderModalFull();
}

async function exportMerged() {
  if (modalPages.length === 0) { showToast(t('toastNoPages')); return; }
  const defaultName = 'merged.pdf';

  // Get file handle FIRST while user gesture is still fresh,
  // before any async PDF building that would expire the gesture token.
  let fileHandle = null;
  if ('showSaveFilePicker' in window) {
    try {
      fileHandle = await window.showSaveFilePicker({
        suggestedName: defaultName,
        types: [{ description: 'PDF File', accept: { 'application/pdf': ['.pdf'] } }],
      });
    } catch(err) {
      if (err.name === 'AbortError') return; // user cancelled
      // Fall through to prompt fallback
    }
  }

  // Now build the PDF (can take as long as needed)
  showLoadingOverlay(t('merging'));
  try {
    const newDoc = await PDFLib.PDFDocument.create();
    for (let i = 0; i < modalPages.length; i++) {
      const pg = modalPages[i];
      setLoadingProgress(
        Math.round((i / modalPages.length) * 90),
        `${t('merging')} ${i + 1} / ${modalPages.length}`
      );
      const srcDoc = await PDFLib.PDFDocument.load(pg.pdfBytes);
      const [copied] = await newDoc.copyPages(srcDoc, [pg.pageIndex]);
      newDoc.addPage(copied);
    }
    setLoadingProgress(95, t('merging'));
    const outBytes = await newDoc.save();
    setLoadingProgress(100, '✓');
    hideLoadingOverlay();

    // Write to the handle we got earlier, or fall back
    let saved = false;
    if (fileHandle) {
      try {
        const writable = await fileHandle.createWritable();
        await writable.write(new Blob([outBytes], { type: 'application/pdf' }));
        await writable.close();
        saved = true;
      } catch(e) {
        saved = await downloadPDF(outBytes, defaultName); // fallback
      }
    } else {
      saved = await downloadPDF(outBytes, defaultName);
    }

    if (saved) { showToast(t('toastExported'), 'success'); closeModal(); }
  } catch(e) {
    hideLoadingOverlay();
    showToast('Error: ' + e.message, 'error');
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
async function downloadPDF(bytes, suggestedName) {
  const blob = new Blob([bytes], { type: 'application/pdf' });

  if ('showSaveFilePicker' in window) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName,
        types: [{ description: 'PDF File', accept: { 'application/pdf': ['.pdf'] } }],
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return true;
    } catch (err) {
      if (err.name === 'AbortError') return false; // user cancelled
    }
  }

  const defaultName = suggestedName || 'export.pdf';
  const filename = prompt(t('filenamePrompt'), defaultName);
  if (filename === null) return false; // user cancelled
  const finalName = (filename.trim() || defaultName).replace(/\.pdf$/i, '') + '.pdf';
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = finalName; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  return true;
}

function showToast(msg, type = '') {
  const tc = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── Resizer ───────────────────────────────────────────────────────────────────
(function() {
  const resizer = document.getElementById('resizer');
  const panel = document.getElementById('previewPanel');
  const workspace = document.getElementById('workspace');
  let dragging = false, startX = 0, startW = 0;

  resizer.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = panel.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = startX - e.clientX;
    const workspaceW = workspace.offsetWidth;
    const minPanelW = 160;
    const maxPanelW = workspaceW - 480; // keep at least 480px for organizer (≈3 cards)
    const newW = Math.max(minPanelW, Math.min(startW + delta, maxPanelW));
    panel.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    // Re-render preview at new size (clear full cache for current page)
    if (previewingId) {
      fullCache.delete(previewingId);
      setPreview(previewingId);
    }
  });
})();

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ── Rubber-band drag selection ────────────────────────────────────────────────
(function() {
  const grid = document.getElementById('pageGrid');
  let band = null, startX = 0, startY = 0, scrollTopStart = 0;
  const organizer = document.getElementById('organizer');

  organizer.addEventListener('mousedown', e => {
    // Only start on empty grid background, left button only
    if (e.button !== 0) return;
    if (e.target.closest('.page-card')) return;
    if (!document.getElementById('pageGrid') || pages.length === 0) return;

    pushHistory(); // snapshot before rubber-band selection starts

    const gridRect = grid.getBoundingClientRect();
    startX = e.clientX - gridRect.left + grid.parentElement.scrollLeft;
    startY = e.clientY - gridRect.top + grid.parentElement.scrollTop;
    scrollTopStart = grid.parentElement.scrollTop;

    band = document.createElement('div');
    band.className = 'rubber-band';
    band.style.left = (startX) + 'px';
    band.style.top = (startY) + 'px';
    band.style.width = '0px';
    band.style.height = '0px';
    grid.appendChild(band);

    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!band) return;
    const gridRect = grid.getBoundingClientRect();
    const scrollEl = grid.parentElement;
    const curX = e.clientX - gridRect.left + scrollEl.scrollLeft;
    const curY = e.clientY - gridRect.top + scrollEl.scrollTop;

    const x = Math.min(startX, curX);
    const y = Math.min(startY, curY);
    const w = Math.abs(curX - startX);
    const h = Math.abs(curY - startY);

    band.style.left = x + 'px';
    band.style.top = y + 'px';
    band.style.width = w + 'px';
    band.style.height = h + 'px';

    // Hit test each card against the band rect
    const bandRect = { left: x, top: y, right: x + w, bottom: y + h };
    document.querySelectorAll('.page-card').forEach(card => {
      const cr = card.getBoundingClientRect();
      const gl = gridRect;
      const scrollEl = grid.parentElement;
      // card position relative to grid (accounting for scroll)
      const cardLeft   = cr.left - gl.left + scrollEl.scrollLeft;
      const cardTop    = cr.top  - gl.top  + scrollEl.scrollTop;
      const cardRight  = cardLeft + cr.width;
      const cardBottom = cardTop  + cr.height;

      const overlaps = !(cardRight  < bandRect.left  ||
                         cardLeft   > bandRect.right ||
                         cardBottom < bandRect.top   ||
                         cardTop    > bandRect.bottom);

      if (overlaps) {
        const id = card.dataset.id;
        const pg = pages.find(p => p.id === id);
        if (pg && !pg.selected) {
          pg.selected = true;
          selectedOrder.push(id);
          pg.orderNum = selectedOrder.length;
          card.classList.add('selected');
          updateSelCount();
        }
      }
    });
  });

  document.addEventListener('mouseup', e => {
    if (!band) return;
    band.remove();
    band = null;
    refreshCardStates();
    updateSelCount();
  });
})();

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
});

// ── Expose globals for inline onclick= attributes ─────────────────────────────
Object.assign(window, {
  setLang, selectAll, unselectAll, inverseSelect, mergeAll, mergeSelected,
  closeModal, exportMerged, splitPage, deletePage,
  modalFilmDelete, undo, redo, modalZoom, modalZoomReset, toggleFilmstrip,
});
</script>
